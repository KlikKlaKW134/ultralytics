# YOLOv8 + CBAM — Modified Architecture
# CBAM disisipkan antara C2f layer 8 dan SPPF
# Layer 9 = CBAM (baru), Layer 10 = SPPF (geser)

nc: 3   # number of classes
scales:
  n: [0.33, 0.25, 1024]
  s: [0.33, 0.50, 1024]
  m: [0.67, 0.75, 768]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.25, 512]

  backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,  [64, 3, 2]]         # 0 — P1/2
  - [-1, 1, Conv,  [128, 3, 2]]        # 1 — P2/4
  - [-1, 3, C2f,   [128, True]]        # 2
  - [-1, 1, Conv,  [256, 3, 2]]        # 3 — P3/8
  - [-1, 6, C2f,   [256, True]]        # 4
  - [-1, 1, Conv,  [512, 3, 2]]        # 5 — P4/16
  - [-1, 6, C2f,   [512, True]]        # 6
  - [-1, 1, Conv,  [1024, 3, 2]]       # 7 — P5/32
  - [-1, 3, C2f,   [1024, True]]       # 8
  - [-1, 1, CBAM,  [1024]]             # 9  ← CBAM BARU (channel=1024)
  - [-1, 1, SPPF,  [1024, 5]]          # 10 ← SPPF geser dari index 9 ke 10

head:
  - [-1,        1, nn.Upsample, [None, 2, "nearest"]]  # 11
  - [[-1, 6],   1, Concat,      [1]]                   # 12 — concat layer 6 (tidak berubah)
  - [-1,        3, C2f,         [512]]                  # 13

  - [-1,        1, nn.Upsample, [None, 2, "nearest"]]  # 14
  - [[-1, 4],   1, Concat,      [1]]                   # 15 — concat layer 4 (tidak berubah)
  - [-1,        3, C2f,         [256]]                  # 16

  - [-1,        1, Conv,        [256, 3, 2]]            # 17
  - [[-1, 13],  1, Concat,      [1]]                   # 18 — 12→13 (BERUBAH +1)
  - [-1,        3, C2f,         [512]]                  # 19

  - [-1,        1, Conv,        [512, 3, 2]]            # 20
  - [[-1, 10],  1, Concat,      [1]]                   # 21 — 9→10 (BERUBAH +1, concat SPPF)
  - [-1,        3, C2f,         [1024]]                 # 22

  - [[16, 19, 22], 1, Detect,   [nc]]                  # 23 — 15,18,21 → 16,19,22 (BERUBAH)
